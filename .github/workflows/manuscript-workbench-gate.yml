name: Manuscript Workbench Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/manuscript-workbench-gate.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/run-manuscript-workbench-gate.mjs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/manuscript-workbench-gate.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/run-manuscript-workbench-gate.mjs"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medical_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d medical_api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @medsys/web exec playwright install --with-deps chromium

      - name: Run manuscript workbench gate
        run: pnpm verify:manuscript-workbench
